name: Environment Prod - Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  deploy:
    name: Terraform Apply - Prod
    runs-on: ubuntu-latest
    environment: prod-rw
    needs: test
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Terraform Apply
        uses: dflook/terraform-apply@v2
        env:
          TF_VAR_domain: ${{ secrets.TF_VAR_domain }}
          TF_VAR_host: ${{ secrets.TF_VAR_host }}
          TF_VAR_sns_alarm_topic_arn: ${{ vars.SNS_ALARM_TOPIC_ARN }}
        with:
          path: terraform/environment/prod
          label: prod
          backend_config: >
            bucket=${{ vars.STATE_BUCKET }},
            key=dnd-planner/prod/terraform.tfstate,
            region=${{ vars.AWS_REGION }}

      - name: Deploy Lambda code
        run: make deploy-lambdas-prod

      - name: Get terraform outputs
        uses: dflook/terraform-output@v1
        id: tf-outputs
        env:
          TF_VAR_domain: ${{ secrets.TF_VAR_domain }}
          TF_VAR_host: ${{ secrets.TF_VAR_host }}
          TF_VAR_sns_alarm_topic_arn: ${{ vars.SNS_ALARM_TOPIC_ARN }}
        with:
          path: terraform/environment/prod
          backend_config: >
            bucket=${{ vars.STATE_BUCKET }},
            key=dnd-planner/prod/terraform.tfstate,
            region=${{ vars.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync rule groups
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r scripts/requirements.txt
          .venv/bin/python scripts/sync_rule_groups.py --table=${{ steps.tf-outputs.outputs.dynamodb_table_name }}

  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: prod-rw
    needs: deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get terraform outputs
        uses: dflook/terraform-output@v1
        id: tf-outputs
        env:
          TF_VAR_domain: ${{ secrets.TF_VAR_domain }}
          TF_VAR_host: ${{ secrets.TF_VAR_host }}
          TF_VAR_sns_alarm_topic_arn: ${{ vars.SNS_ALARM_TOPIC_ARN }}
        with:
          path: terraform/environment/prod
          backend_config: >
            bucket=${{ vars.STATE_BUCKET }},
            key=dnd-planner/prod/terraform.tfstate,
            region=${{ vars.AWS_REGION }}

      - name: Build
        run: pnpm build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.tf-outputs.outputs.cognito_user_pool_id }}
          VITE_COGNITO_WEB_CLIENT_ID: ${{ steps.tf-outputs.outputs.cognito_web_client_id }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ steps.tf-outputs.outputs.cognito_identity_pool_id }}
          VITE_COGNITO_LOGIN_DOMAIN: ${{ steps.tf-outputs.outputs.cognito_login_domain }}

      - name: Sync to S3
        run: aws s3 sync build/ s3://${{ steps.tf-outputs.outputs.s3_bucket_name }}/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tf-outputs.outputs.cloudfront_distribution_id }} --paths "/*"
