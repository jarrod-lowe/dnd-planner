name: Environment Prod - Plan

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Terraform Plan - Prod
    runs-on: ubuntu-latest
    environment: prod-ro
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo "Skipping Terraform validation for Dependabot PR (no access to secrets)"

      - name: Configure AWS credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Format Check
        if: github.actor != 'dependabot[bot]'
        uses: dflook/terraform-fmt@v1
        with:
          path: terraform

      - name: Terraform Validate
        if: github.actor != 'dependabot[bot]'
        uses: dflook/terraform-validate@v1
        with:
          path: terraform/environment/prod

      - name: Terraform Plan
        if: github.actor != 'dependabot[bot]'
        uses: dflook/terraform-plan@v1
        env:
          TF_VAR_domain: ${{ secrets.TF_VAR_domain }}
          TF_VAR_host: ${{ secrets.TF_VAR_host }}
        with:
          path: terraform/environment/prod
          label: prod
          backend_config: >
            bucket=${{ vars.STATE_BUCKET }},
            key=dnd-planner/prod/terraform.tfstate,
            region=${{ vars.AWS_REGION }}

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
