openapi: 3.0.3
info:
  title: D&D Planner API
  version: 1.0.0
  description: API for D&D Planner application

x-amazon-apigateway-request-validators:
  all:
    validateRequestBody: true
    validateRequestParameters: true

x-amazon-apigateway-request-validator: all

components:
  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - '${cognito_user_pool_arn}'

# All endpoints require Cognito authentication
security:
  - CognitoAuthorizer: []

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API
      operationId: getHealth
      responses:
        '200':
          description: Successful health check
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"status": "ok"}'

  /test:
    get:
      summary: Test endpoint
      description: Returns a test response to verify Lambda integration
      operationId: getTest
      requestBody:
        content: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: '${test_handler_uri}'

  /user:
    get:
      summary: Get current user data
      description: Returns all data (META and characters) for the authenticated user
      operationId: getUser
      responses:
        '200':
          description: User data retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      x-amazon-apigateway-integration:
        type: aws
        credentials: '${api_gateway_role_arn}'
        uri: 'arn:aws:apigateway:${aws_region}:dynamodb:action/Query'
        httpMethod: POST
        requestTemplates:
          application/json: |
            {
              "TableName": "${dynamodb_table_name}",
              "KeyConditionExpression": "PK = :pk",
              "ExpressionAttributeValues": {
                ":pk": {"S": "USER#$context.authorizer.claims.sub"}
              }
            }
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: |
                #set($items = $input.path('$.Items'))
                #if($items.size() == 0)
                #set($context.responseOverride.status = 404)
                {"error": "User not found"}
                #else
                [
                #set($itemHasNext = false)
                #foreach($item in $items)
                  #if($itemHasNext), #end
                  #set($itemHasNext = true)
                  {
                  #set($first = true)
                  #foreach($key in $item.keySet())
                    #if($key != "PK" && $key != "SK")
                      #if($first)
                      #set($first = false)
                      #else
                      ,
                      #end
                      #set($typed = $item.get($key))
                      #set($val = "")
                      #if($typed.containsKey("S"))
                      #set($val = $typed.get("S"))
                      "$key": "$val"
                      #elseif($typed.containsKey("N"))
                      #set($val = $typed.get("N"))
                      "$key": $val
                      #elseif($typed.containsKey("BOOL"))
                      #set($val = $typed.get("BOOL"))
                      "$key": $val
                      #elseif($typed.containsKey("NULL"))
                      "$key": null
                      #elseif($typed.containsKey("L"))
                      #set($val = $typed.get("L"))
                      "$key": $val
                      #elseif($typed.containsKey("M"))
                      #set($val = $typed.get("M"))
                      "$key": $val
                      #else
                      "$key": $util.toJson($typed)
                      #end
                    #end
                  #end
                  }
                #end
                ]
                #end

  /characters/{characterId}/rule-groups:
    get:
      summary: Get rule groups for a character
      description: Returns all rule group IDs assigned to a character (must be owned by authenticated user)
      operationId: getCharacterRuleGroups
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  characterId:
                    type: string
                  ruleGroups:
                    type: array
                    items:
                      type: string
        '403':
          description: Forbidden - character not found or not owned by user
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      x-amazon-apigateway-integration:
        type: aws
        credentials: '${api_gateway_role_arn}'
        uri: 'arn:aws:apigateway:${aws_region}:dynamodb:action/Query'
        httpMethod: POST
        requestTemplates:
          application/json: |
            {
              "TableName": "${dynamodb_table_name}",
              "KeyConditionExpression": "PK = :pk AND begins_with(SK, :skPrefix)",
              "FilterExpression": "userId = :userId",
              "ExpressionAttributeValues": {
                ":pk": {"S": "CHAR#$input.params('characterId')"},
                ":skPrefix": {"S": "RULEGROUP#"},
                ":userId": {"S": "$context.authorizer.claims.sub"}
              }
            }
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: |
                #set($items = $input.path('$.Items'))
                #if($items.size() == 0)
                #set($context.responseOverride.status = 403)
                {"error": "Forbidden"}
                #else
                {
                  "userId": "$context.authorizer.claims.sub",
                  "characterId": "$input.params('characterId')",
                  "ruleGroups": [
                #set($first = true)
                #foreach($item in $items)
                  #if($first)
                  #set($first = false)
                  #else
                  ,
                  #end
                  "$item.get('ruleGroupId').get('S')"
                #end
                  ]
                }
                #end

  /rule-groups/batch:
    post:
      summary: Get rule groups by IDs
      description: Batch fetch rule groups by their IDs (max 100)
      operationId: getRuleGroups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
            example:
              ids: ['uuid-1', 'uuid-2', 'uuid-3']
      responses:
        '200':
          description: Rule groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ruleGroups:
                    type: array
                    items:
                      type: object
                      properties:
                        ruleGroupId:
                          type: string
                        type:
                          type: string
                        name:
                          type: string
                        rules:
                          type: string
                          description: JSON-encoded array of rules
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
        '400':
          description: Bad request - invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      x-amazon-apigateway-integration:
        type: aws
        credentials: '${api_gateway_role_arn}'
        uri: 'arn:aws:apigateway:${aws_region}:dynamodb:action/BatchGetItem'
        httpMethod: POST
        requestTemplates:
          application/json: |
            #set($body = $input.path('$'))
            #set($ids = $body.ids)
            {
              "RequestItems": {
                "${dynamodb_table_name}": {
                  "Keys": [
            #set($first = true)
            #foreach($id in $ids)
              #if($first)
                #set($first = false)
              #else
                ,
              #end
                {"PK": {"S": "RULEGROUP#$id"}, "SK": {"S": "META#"}}
            #end
                  ]
                }
              }
            }
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: |
                #set($responses = $input.path('$.Responses'))
                #set($tableName = "${dynamodb_table_name}")
                #set($items = $responses.get($tableName))
                {
                  "ruleGroups": [
                #set($itemFirst = true)
                #foreach($item in $items)
                  #if($itemFirst)
                  #set($itemFirst = false)
                  #else
                  ,
                  #end
                    {
                      "ruleGroupId": "$item.get('ruleGroupId').get('S')",
                      "type": "$item.get('type').get('S')",
                      "name": "$item.get('name').get('S')",
                      "rules": "$item.get('rules').get('S')",
                      "createdAt": "$item.get('createdAt').get('S')",
                      "updatedAt": "$item.get('updatedAt').get('S')"
                    }
                #end
                  ]
                }
