# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: class-paladin-level1
    requires:
      - spellcasting
    translations:
      en:
        name: Paladin Level 1
        description: Paladin class features at level 1, including proficiency bonus and spellcasting
        keywords: [paladin, class, level1, spellcasting]
      en-x-tlh:
        name: Paladin Level 1
        description: Paladin Segh level 1, proficient chel
        keywords: [paladin, segh, level1]
    rules:
      # Proficiency Bonus - Level 1 Paladin adds +2
      - id: paladin-level1-proficiency
        phase: early
        after:
          - group: proficiency-base
        activities:
          - type: numberIncrement
            target:
              fact: proficiency.bonus
            source:
              number: 2

      # Spell Slots - Level 1 Paladin gets 2 level 1 slots
      - id: paladin-level1-spell-slots
        phase: early
        after:
          - group: spellcasting-slots-total
        group:
          - spellcasting-slots-set
        activities:
          - type: numberIncrement
            target:
              fact: spellcasting.slots.level1.total
            source:
              number: 2
