# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: movement
    translations:
      en:
        name: Movement
        description: Core movement rules for walking, swimming, and flying
        keywords: [movement, walk, swim, fly, speed, terrain]
      en-x-tlh:
        name: Do
        description: Do DIvI' naQ 'ej Do DIvI'
        keywords: [Do, bIQ, peng]
    rules:
      # Movement Actions
      - id: action-move-reset
        phase: early
        after:
          - group: species-constants
        activities:
          - type: numberCopy
            source:
              fact: character.movement.total
            target:
              fact: character.movement.remaining

      - id: compute-half-movement-total
        phase: normal
        group:
          - half-movement-total
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.total
            target:
              fact: character.movement.half_total
            args:
              multiplier: 0.5
      - id: compute-half-movement-remaining
        phase: normal
        after:
          - group: move
        group:
          - half-movement-remaining
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.remaining
            target:
              fact: character.movement.half_remaining
            args:
              multiplier: 0.5
      - id: action-move-walk-offer
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-walk-offer.out_of_movement
                    severity: error
            rule:
              id: move-walk
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.movement.move-walk.name
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                # Consume remaining movement
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                # Clear errors before checking
                - *error-clear
                # Track illegal state (movement went negative)
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-walk-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0

      - id: action-move-rough-terrain-offer
        after:
          - group: half-movement-total
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 10
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-rough-terrain-offer.out_of_movement
                    severity: error
            rule:
              id: move-rough-terrain
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.movement.move-rough-terrain.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.half_remaining
                maxDistance:
                  capture: true
                  default:
                    fact: character.movement.half_total
              activities:
                # Consume double movement (rough terrain costs 2x)
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                # Clear errors before checking
                - *error-clear
                # Track illegal state (movement went negative)
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-walk-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0

      # Swim with normal cost (cost < 2)
      - id: action-move-swim-offer
        when:
          - fact: character.movement.swim.cost
            operator: equals
            value: 1
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.swim.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-swim-offer.cannot_swim
                    severity: error
              - condition:
                  fact: character.movement.swim.cost
                  operator: lessThan
                  value: 2
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-swim-offer.out_of_movement
                    severity: error
            rule:
              id: move-swim
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.movement.move-swim.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - *error-clear
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-swim-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-swim-offer.cannot_swim
                  when:
                    fact: character.movement.swim.can
                    operator: equals
                    value: 0

      # Swim with costly movement (cost >= 2)
      - id: action-move-swim-costly-offer
        when:
          - fact: character.movement.swim.cost
            operator: equals
            value: 2
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.swim.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-swim-offer.cannot_swim
                    severity: error
              - condition:
                  fact: character.movement.swim.cost
                  operator: greaterThanOrEqual
                  value: 2
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 10
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-swim-offer.out_of_movement
                    severity: error
            rule:
              id: move-swim-costly
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.movement.move-swim.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.half_remaining
                maxDistance:
                  default:
                    fact: character.movement.half_total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - *error-clear
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-swim-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-swim-offer.cannot_swim
                  when:
                    fact: character.movement.swim.can
                    operator: equals
                    value: 0

      # Fly (1x cost)
      - id: action-move-fly-offer
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.fly.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-fly-offer.cannot_fly
                    severity: error
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.movement.action-move-fly-offer.out_of_movement
                    severity: error
            rule:
              id: move-fly
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.movement.move-fly.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - *error-clear
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-fly-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.movement.action-move-fly-offer.cannot_fly
                  when:
                    fact: character.movement.fly.can
                    operator: lessThanOrEqual
                    value: 1
