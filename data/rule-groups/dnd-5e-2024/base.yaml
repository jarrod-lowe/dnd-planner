# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: base
    translations:
      en:
        name: Base Rules
        description: Core D&D 5e 2024 rules for movement and actions
        keywords: [basic, core, movement, actions, walk, swim, fly]
      en-x-tlh:
        name: raD naQ
        description: DIvI' Hol D&D 5e 2024 raD naQ
        keywords: [ratlh, rutlh, Do, DIvI']
    rules:
      # Long Rest - reset flag to 0 each turn
      - id: rest-long-reset
        phase: early
        group:
          - rest-reset
        activities:
          - type: numberSet
            target:
              fact: rest.long
            source:
              number: 0

      # Long Rest - offer the long rest action
      - id: offer-long-rest
        activities:
          - type: offerRule
            rule:
              id: long-rest
              ui:
                model: rest
                section: rest
                name: rule.dnd-5e-2024.base.long-rest.name
              phase: early
              after:
                - group: rest-reset
              activities:
                - type: numberSet
                  target:
                    fact: rest.long
                  source:
                    number: 1

      # Turn Counter - increments each turn, never resets
      - id: turn-counter-increment
        phase: early
        group:
          - turn-counter
        activities:
          - type: numberIncrement
            target:
              fact: turn.counter
            source:
              number: 1

      # Proficiency Bonus - reset to base (classes add to this)
      - id: proficiency-reset
        phase: early
        group:
          - proficiency-base
        activities:
          - type: numberSet
            target:
              fact: proficiency.bonus
            source:
              number: 0

      # Movement Actions
      - id: action-move-reset
        phase: early
        after:
          - group: species-constants
        activities:
          - type: numberCopy
            source:
              fact: character.movement.total
            target:
              fact: character.movement.remaining

      # Action Resources - set max actions (base rule: 1 action per turn)
      - id: action-max
        phase: early
        group:
          - action-max
        activities:
          - type: numberSet
            source:
              number: 1
            target:
              fact: actions.max

      # Action Resources - reset remaining at start of turn
      - id: action-reset
        phase: early
        after:
          - group: action-max
        activities:
          - type: numberCopy
            source:
              fact: actions.max
            target:
              fact: actions.remaining
      - id: compute-half-movement-total
        phase: normal
        group:
          - half-movement-total
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.total
            target:
              fact: character.movement.half_total
            args:
              multiplier: 0.5
      - id: compute-half-movement-remaining
        phase: normal
        after:
          - group: move
        group:
          - half-movement-remaining
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.remaining
            target:
              fact: character.movement.half_remaining
            args:
              multiplier: 0.5
      - id: action-move-walk-offer
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-walk-offer.out_of_movement
                    severity: error
            rule:
              id: move-walk
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-walk.name
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                # Consume remaining movement
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                # Clear errors before checking
                - type: setClear
                  target:
                    var: errors
                # Track illegal state (movement went negative)
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-walk-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0

      - id: action-move-rough-terrain-offer
        after:
          - group: half-movement-total
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 10
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-rough-terrain-offer.out_of_movement
                    severity: error
            rule:
              id: move-rough-terrain
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-rough-terrain.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.half_remaining
                maxDistance:
                  capture: true
                  default:
                    fact: character.movement.half_total
              activities:
                # Consume double movement (rough terrain costs 2x)
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                # Clear errors before checking
                - type: setClear
                  target:
                    var: errors
                # Track illegal state (movement went negative)
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-walk-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0

      # Swim with normal cost (cost < 2)
      - id: action-move-swim-offer
        when:
          - fact: character.movement.swim.cost
            operator: equals
            value: 1
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.swim.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-swim-offer.cannot_swim
                    severity: error
              - condition:
                  fact: character.movement.swim.cost
                  operator: lessThan
                  value: 2
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-swim-offer.out_of_movement
                    severity: error
            rule:
              id: move-swim
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-swim.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: setClear
                  target:
                    var: errors
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-swim-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-swim-offer.cannot_swim
                  when:
                    fact: character.movement.swim.can
                    operator: equals
                    value: 0

      # Swim with costly movement (cost >= 2)
      - id: action-move-swim-costly-offer
        when:
          - fact: character.movement.swim.cost
            operator: equals
            value: 2
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.swim.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-swim-offer.cannot_swim
                    severity: error
              - condition:
                  fact: character.movement.swim.cost
                  operator: greaterThanOrEqual
                  value: 2
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 10
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-swim-offer.out_of_movement
                    severity: error
            rule:
              id: move-swim-costly
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-swim.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.half_remaining
                maxDistance:
                  default:
                    fact: character.movement.half_total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: setClear
                  target:
                    var: errors
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-swim-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-swim-offer.cannot_swim
                  when:
                    fact: character.movement.swim.can
                    operator: equals
                    value: 0

      # Fly (1x cost)
      - id: action-move-fly-offer
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.fly.can
                  operator: greaterThanOrEqual
                  value: 1
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-fly-offer.cannot_fly
                    severity: error
              - condition:
                  fact: character.movement.remaining
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-fly-offer.out_of_movement
                    severity: error
            rule:
              id: move-fly
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-fly.name
                packBehind: move-walk
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.remaining
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                - type: numberIncrement
                  target:
                    fact: character.movement.remaining
                  source:
                    var: distance
                  subtract: true
                - type: setClear
                  target:
                    var: errors
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-fly-offer.out_of_movement
                  when:
                    fact: character.movement.remaining
                    operator: lessThan
                    value: 0
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-move-fly-offer.cannot_fly
                  when:
                    fact: character.movement.fly.can
                    operator: lessThanOrEqual
                    value: 1

      # Free Action
      - id: action-free-offer
        activities:
          - type: offerRule
            rule:
              id: free-action
              ui:
                model: free
                section: free
                name: rule.dnd-5e-2024.base.free-action.name
              activities: []

      # Help Action
      - id: action-help-offer
        after:
          - group: action
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: actions.remaining
                  operator: greaterThan
                  value: 0
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-help-offer.no_action
                    severity: error
            rule:
              id: help-action
              ui:
                model: help
                section: action-other
                name: rule.dnd-5e-2024.base.help-action.name
              group:
                - action
              activities:
                - type: numberIncrement
                  target:
                    fact: actions.remaining
                  source:
                    number: 1
                  subtract: true
                - type: setClear
                  target:
                    var: errors
                - type: setAdd
                  target:
                    var: errors
                  source:
                    string: rule.dnd-5e-2024.base.action-help-offer.no_action
                  when:
                    fact: actions.remaining
                    operator: lessThan
                    value: 0
