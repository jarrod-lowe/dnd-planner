# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: base
    name: rule.dnd-5e-2024.base.name
    description: rule.dnd-5e-2024.base.description
    rules:
      # Movement Actions
      - id: action-move-reset
        phase: early
        after:
          - group: species-constants
        activities:
          - type: numberCopy
            source:
              fact: character.movement.total
            target:
              fact: character.movement.current
      - id: compute-half-movement-total
        phase: normal
        group:
          - half-movement-total
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.total
            target:
              fact: character.movement.half_total
            args:
              multiplier: 0.5
      - id: compute-half-movement-remaining
        phase: normal
        after:
          - group: move
        group:
          - half-movement-remaining
        activities:
          - type: numberFunction
            function: multiply
            sources:
              - fact: character.movement.current
            target:
              fact: character.movement.half_remaining
            args:
              multiplier: 0.5
      - id: action-move-walk-offer
        after:
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.current
                  operator: greaterThanOrEqual
                  value: 5
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-walk-offer.out_of_movement
                    severity: error
            rule:
              id: move-walk
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-walk.name
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.current
                maxDistance:
                  default:
                    fact: character.movement.total
              activities:
                # Consume remaining movement
                - type: numberIncrement
                  target:
                    fact: character.movement.current
                  source:
                    var: distance
                  subtract: true
                # Track illegal state (movement went negative)
                - type: numberSet
                  target:
                    var: illegal
                  source:
                    condition:
                      fact: character.movement.current
                      operator: lessThan
                      value: 0

      - id: action-move-rough-terrain-offer
        after:
          - group: half-movement-total
          - group: half-movement-remaining
        activities:
          - type: offerRule
            legalWhen:
              - condition:
                  fact: character.movement.current
                  operator: greaterThanOrEqual
                  value: 10
                illegalDiagnostics:
                  - code: rule.dnd-5e-2024.base.action-move-rough-terrain-offer.out_of_movement
                    severity: error
            rule:
              id: move-rough-terrain
              ui:
                model: move
                section: move
                name: rule.dnd-5e-2024.base.move-rough-terrain.name
              group:
                - move
              vars:
                distance:
                  capture: true
                  default:
                    fact: character.movement.half_remaining
                maxDistance:
                  capture: true
                  default:
                    fact: character.movement.half_total
              activities:
                # Consume double movement (rough terrain costs 2x)
                - type: numberIncrement
                  target:
                    fact: character.movement.current
                  source:
                    var: distance
                  subtract: true
                - type: numberIncrement
                  target:
                    fact: character.movement.current
                  source:
                    var: distance
                  subtract: true
                # Track illegal state (movement went negative)
                - type: numberSet
                  target:
                    var: illegal
                  source:
                    condition:
                      fact: character.movement.current
                      operator: lessThan
                      value: 0

      # Free Action
      - id: action-free-offer
        activities:
          - type: offerRule
            rule:
              id: free-action
              ui:
                model: free
                section: free
                name: rule.dnd-5e-2024.base.free-action.name
              activities: []
