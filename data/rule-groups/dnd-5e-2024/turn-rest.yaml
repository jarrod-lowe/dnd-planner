# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: turn-rest
    translations:
      en:
        name: Turn and Rest
        description: Core rules for turn counting and long rest management
        keywords: [turn, rest, long rest, counter]
      en-x-tlh:
        name: wa'DIch 'ej nIb poH
        description: wa'DIch 'ej nIb poH DIvI' naQ
        keywords: [wa'DIch, nIb, poH]
    rules:
      # Long Rest - reset flag to 0 each turn
      - id: rest-long-reset
        phase: early
        group:
          - rest-reset
        activities:
          - type: numberSet
            target:
              fact: rest.long
            source:
              number: 0

      # Long Rest - offer the long rest action
      - id: offer-long-rest
        activities:
          - type: offerRule
            rule:
              id: long-rest
              ui:
                model: rest
                section: rest
                name: rule.dnd-5e-2024.turn-rest.long-rest.name
              phase: early
              after:
                - group: rest-reset
              activities:
                - type: numberSet
                  target:
                    fact: rest.long
                  source:
                    number: 1

      # Turn Counter - increments each turn, never resets
      - id: turn-counter-increment
        phase: early
        group:
          - turn-counter
        activities:
          - type: numberIncrement
            target:
              fact: turn.counter
            source:
              number: 1
