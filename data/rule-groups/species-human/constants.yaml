# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: species-human
    translations:
      en:
        name: Human
        description: Human species constants and movement rules
        keywords: [human, species, race, movement]
      en-x-tlh:
        name: Human
        description: Human Segh
        keywords: [Human, Segh, Do]
    rules:
      # Max Distance
      - id: set-base-distance
        phase: early
        group:
          - species-constants
        activities:
          - type: numberSet
            target:
              fact: character.movement.total
            source:
              number: 30
          - type: numberSet
            target:
              fact: character.movement.swim.can
            source:
              number: 1
          - type: numberSet
            target:
              fact: character.movement.swim.cost
            source:
              number: 2
          - type: numberSet
            target:
              fact: character.movement.fly.can
            source:
              number: 0
