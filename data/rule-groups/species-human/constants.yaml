# yaml-language-server: $schema=../schema.json
ruleGroups:
  - id: species-human
    name: rule.species-human.constants.name
    description: rule.species-human.constants.description
    rules:
      # Max Distance
      - id: set-base-distance
        phase: early
        group:
          - species-constants
        activities:
          - type: numberSet
            target:
              fact: character.movement.total
            source:
              number: 30
          - type: numberSet
            target:
              fact: character.movement.swim.can
            source:
              number: 1
          - type: numberSet
            target:
              fact: character.movement.swim.cost
            source:
              number: 2
          - type: numberSet
            target:
              fact: character.movement.fly.can
            source:
              number: 0
